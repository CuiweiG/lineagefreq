url: https://CuiweiG.github.io/lineagefreq/

template:
  bootstrap: 5
  bootswatch: cosmo

reference:
  - title: "Data"
    desc: "Create and manipulate lineage frequency data"
    contents:
      - lfq_data
      - is_lfq_data
      - as_lfq_data
      - as.data.frame.lfq_data
      - read_lineage_counts
      - simulate_dynamics
      - collapse_lineages
      - filter_sparse

  - title: "Modeling"
    desc: "Fit frequency dynamics models"
    contents:
      - fit_model
      - lfq_engines
      - register_engine
      - unregister_engine

  - title: "Pipe API"
    desc: "Tidyverse-style chaining"
    contents:
      - lfq_fit
      - lfq_advantage
      - lfq_forecast
      - lfq_score
      - lfq_summary

  - title: "Inference"
    desc: "Extract growth advantages and forecasts"
    contents:
      - growth_advantage
      - starts_with("forecast")
      - summarize_emerging
      - sequencing_power

  - title: "Backtesting"
    desc: "Evaluate forecast accuracy"
    contents:
      - backtest
      - score_forecasts
      - compare_models

  - title: "Visualization"
    desc: "Publication-ready plots"
    contents:
      - starts_with("autoplot")
      - plot_backtest

  - title: "S3 Methods"
    desc: "Standard R model interface"
    contents:
      - print.lfq_fit
      - summary.lfq_fit
      - coef.lfq_fit
      - tidy.lfq_fit
      - glance.lfq_fit
      - augment.lfq_fit

  - title: "Utilities"
    contents:
      - lfq_stan_available
      - lfq_version

  - title: "Datasets"
    desc: "Built-in example datasets"
    contents:
      - sarscov2_us_2022
      - cdc_ba2_transition
      - cdc_sarscov2_jn1
      - influenza_h3n2

articles:
  - title: "Getting Started"
    contents:
      - introduction
  - title: "Case Studies"
    contents:
      - real-data-analysis
  - title: "Advanced Topics"
    contents:
      - model-comparison
      - surveillance-workflow
