name: pkgdown

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libharfbuzz-dev libfribidi-dev

      - name: Install dependencies
        run: |
          install.packages("pak", repos = "https://cloud.r-project.org")
          # Strip cmdstanr/posterior from DESCRIPTION before resolving deps
          # (not on CRAN; only on mc-stan.org repo which pak cannot reach)
          desc <- readLines("DESCRIPTION")
          desc <- desc[!grepl("^\\s+cmdstanr", desc)]
          desc <- desc[!grepl("^\\s+posterior", desc)]
          desc <- desc[!grepl("^Additional_repositories", desc)]
          # Fix trailing comma from removed lines
          for (i in seq_along(desc)) {
            if (i < length(desc) && grepl(",\\s*$", desc[i]) &&
                !grepl("^\\s", desc[i + 1])) {
              desc[i] <- sub(",\\s*$", "", desc[i])
            }
          }
          writeLines(desc, "DESCRIPTION")
          pak::local_install_deps(upgrade = FALSE)
          pak::pak("any::pkgdown")
        shell: Rscript {0}

      - name: Restore DESCRIPTION
        run: git checkout -- DESCRIPTION

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = TRUE)
        shell: Rscript {0}

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          clean: false
          branch: gh-pages
          folder: docs
