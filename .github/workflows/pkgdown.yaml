name: pkgdown

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        run: |
          install.packages(c("remotes", "pkgdown"), repos = "https://cloud.r-project.org")
          desc <- readLines("DESCRIPTION")
          desc <- desc[!grepl("^\\s+cmdstanr", desc)]
          desc <- desc[!grepl("^\\s+posterior", desc)]
          desc <- desc[!grepl("^Additional_repositories", desc)]
          for (i in seq_along(desc)) {
            if (grepl(",\\s*$", desc[i]) && i < length(desc) &&
                !grepl("^\\s", desc[i+1])) {
              desc[i] <- sub(",\\s*$", "", desc[i])
            }
          }
          writeLines(desc, "DESCRIPTION")
          remotes::install_deps(dependencies = TRUE, upgrade = "never")
        shell: Rscript {0}

      - name: Restore DESCRIPTION
        run: git checkout -- DESCRIPTION

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          clean: false
          branch: gh-pages
          folder: docs
