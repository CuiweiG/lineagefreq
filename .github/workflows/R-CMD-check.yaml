name: R-CMD-check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          # R-devel temporarily disabled: lazyeval (ggplot2 dep)
          # fails to compile due to PREXPR API removal in R-devel.
          # Re-enable when lazyeval is updated on CRAN.
          # - {os: ubuntu-latest, r: 'devel'}
          - {os: ubuntu-latest, r: 'oldrel-1'}
          - {os: macos-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Install R dependencies
        run: |
          install.packages(c("rcmdcheck", "remotes"), repos = "https://cloud.r-project.org")
          # Strip cmdstanr/posterior from DESCRIPTION before installing deps
          desc <- readLines("DESCRIPTION")
          desc <- desc[!grepl("^\\s+cmdstanr", desc)]
          desc <- desc[!grepl("^\\s+posterior", desc)]
          desc <- desc[!grepl("^Additional_repositories", desc)]
          # Fix trailing comma
          for (i in seq_along(desc)) {
            if (grepl(",\\s*$", desc[i]) && i < length(desc) &&
                !grepl("^\\s", desc[i+1])) {
              desc[i] <- sub(",\\s*$", "", desc[i])
            }
          }
          writeLines(desc, "DESCRIPTION_CI")
          file.copy("DESCRIPTION_CI", "DESCRIPTION", overwrite = TRUE)
          remotes::install_deps(dependencies = TRUE, upgrade = "never")
          # Restore original DESCRIPTION for check
          if (file.exists("DESCRIPTION.bak")) file.copy("DESCRIPTION.bak", "DESCRIPTION", overwrite = TRUE)
        shell: Rscript {0}

      - name: Restore original DESCRIPTION
        run: |
          git checkout -- DESCRIPTION

      - name: R CMD check
        continue-on-error: ${{ matrix.config.allow-failure == true }}
        run: |
          options(crayon.enabled = TRUE)
          rcmdcheck::rcmdcheck(
            args = c("--no-manual", "--as-cran"),
            error_on = "error",
            check_dir = "check"
          )
        shell: Rscript {0}
        env:
          _R_CHECK_FORCE_SUGGESTS_: false
